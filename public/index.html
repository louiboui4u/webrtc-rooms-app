<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Video Rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container mt-5" id="lobby-view">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Available Video Rooms</h2>
        <div>
            <button class="btn btn-outline-secondary me-2" id="change-username-btn">Change Name</button>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createRoomModal">Create Room</button>
        </div>
    </div>
    <div class="row" id="room-list">
        <!-- Room cards will be generated here -->
    </div>
</div>

<div class="container-fluid d-none h-100 py-3" id="room-view">
    <div class="d-flex justify-content-between align-items-center mb-3 text-white bg-dark p-3 rounded shadow-sm">
        <h3 id="current-room-name" class="m-0">Room Name</h3>
        <div>
            <button class="btn btn-outline-light me-2" id="toggle-audio">Mute Audio</button>
            <button class="btn btn-outline-light me-2" id="toggle-video">Stop Video</button>
            <button class="btn btn-outline-info me-2" id="share-screen">Share Screen</button>
            <button class="btn btn-danger" id="leave-room-btn">Leave Room</button>
        </div>
    </div>
    <div id="video-grid" class="d-flex flex-wrap justify-content-center gap-3">
        <!-- Videos will be injected here -->
    </div>
</div>

<!-- Create Room Modal -->
<div class="modal fade" id="createRoomModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Create a new Room</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="text" id="new-room-name" class="form-control mb-3" placeholder="Room Name" required>
        <input type="password" id="new-room-password" class="form-control" placeholder="Password (Optional)">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="create-room-btn">Create & Join</button>
      </div>
    </div>
  </div>
</div>

<!-- Password Modal -->
<div class="modal fade" id="passwordModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Enter Password</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="password" id="join-room-password" class="form-control" placeholder="Password">
        <div id="password-error" class="text-danger mt-2 d-none small">Invalid password</div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="join-room-btn">Join</button>
      </div>
    </div>
  </div>
</div>

<!-- Username Modal -->
<div class="modal fade" id="usernameModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Enter your name</h5>
      </div>
      <div class="modal-body">
        <input type="text" id="username-input" class="form-control" placeholder="Your Name" required>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" id="save-username-btn">Save Name</button>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
